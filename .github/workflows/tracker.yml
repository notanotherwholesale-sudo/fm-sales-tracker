name: FM Sales Tracker

on:
  schedule:
    # Every 30 min. GitHub bills each run as >=1 min; 48 runs/day keeps a private repo
    # safely inside the 2,000-min/month free budget (~1,600 used). Tighter cadence needs a
    # public repo (unlimited Actions minutes) — see README. Don't drop below ~25 min here.
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force_reversals:
        description: "Run the full cancellation sweep this run"
        type: boolean
        default: false

# Allow the job to commit the data store back to this (private) repo.
permissions:
  contents: write

# Never run two pipeline jobs at once (avoids CSV write races); let an in-flight run finish.
concurrency:
  group: fm-sales-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 10          # bound worst-case runtime (protects the Actions-minutes budget)
    steps:
      - uses: actions/checkout@v4

      # Use the runner's built-in Python 3 (stdlib-only code) — no setup step needed, faster runs.
      - name: Ingest new sale emails  (never fails the job)
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FORCE_REVERSALS: ${{ inputs.force_reversals && '1' || '' }}
        run: python3 ingest.py

      - name: Rebuild dashboard + widget feed
        run: python3 build_dashboard.py

      - name: Commit updated data store
        run: |
          git config user.name  "FM Sales Bot"
          git config user.email "fm-bot@users.noreply.github.com"
          # Stage each file individually — a missing one (e.g. no delist queue yet) must
          # NOT abort `git add` and silently stage nothing (that once dropped real data).
          for f in fm_sales.csv processed_ids.json processed_reversals.json collisions.csv delist_queue.csv; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: $(date -u '+%Y-%m-%d %H:%M') run"
            git push
          fi

      - name: Publish dashboard to the public Pages repo
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_PUSH_TOKEN }}
        run: |
          mkdir -p site
          cp FM_Sales_Dashboard.html site/index.html
          cp summary.json site/summary.json
          cd site
          git init -q && git checkout -q -B main
          git add -A
          git -c user.email="fm-bot@users.noreply.github.com" -c user.name="FM Sales Bot" \
              commit -q -m "dashboard $(date -u '+%Y-%m-%d %H:%M')"
          git push -q -f \
            "https://x-access-token:${PAGES_TOKEN}@github.com/notanotherwholesale-sudo/fm-dashboard.git" \
            main
          echo "Published to https://notanotherwholesale-sudo.github.io/fm-dashboard/"
